name: Pull Request Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: website
      
      - name: Build Next.js
        run: npm run build
        working-directory: website
      
      - name: Prepare preview assets
        run: |
          mkdir -p preview
          cp index.html preview/ 2>/dev/null || true
          cp -r components preview/ 2>/dev/null || true
          cp -r src preview/ 2>/dev/null || true
          cp -r website/out/* preview/ 2>/dev/null || true
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./preview

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pr-preview-${{ github.event.pull_request.number }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy PR preview
        id: deployment
        uses: actions/deploy-pages@v4

  comment:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const body = `🔍 **Preview deployed!** \n\nYour PR preview is available at: ${{ steps.deployment.outputs.page_url }}\n\n- Preview will auto-update when new changes are pushed to this branch`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });