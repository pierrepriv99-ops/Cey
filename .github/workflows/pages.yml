name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'components/**'
      - 'src/**'
      - 'index.html'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: website
      
      - name: Build Next.js
        run: npm run build
        working-directory: website
      
      - name: Prepare static assets
        run: |
          mkdir -p _site
          cp index.html _site/ 2>/dev/null || true
          cp -r components _site/ 2>/dev/null || true
          cp -r src _site/ 2>/dev/null || true
      
      - name: Copy Next.js build
        run: |
          cp -r website/out/* _site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
