apiVersion: apps/v1
kind: Deployment
metadata:
  name: cryos-web
  labels:
    app: cryos-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cryos-web
  template:
    metadata:
      labels:
        app: cryos-web
    spec:
      containers:
      - name: web
        image: cryos/web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cryos-web
spec:
  selector:
    app: cryos-web
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cryos-web
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - cryos.io
    - www.cryos.io
    secretName: cryos-tls
  rules:
  - host: cryos.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cryos-web
            port:
              number: 80